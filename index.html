<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程管理 | Schedule Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            :root {
                --color-bg: #faf9f7;
                --color-surface: #ffffff;
                --color-surface-hover: #f5f4f2;
                --color-text: #1a1a1a;
                --color-text-muted: #6b6b6b;
                --color-accent: #e07a5f;
                --color-accent-light: #f4d3ca;
                --color-success: #81b29a;
                --color-warning: #f2cc8f;
                --color-border: #e8e6e3;
                --shadow-soft: 0 2px 8px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
                --shadow-hover: 0 4px 16px rgba(0,0,0,0.08), 0 16px 48px rgba(0,0,0,0.12);
            }
            body {
                font-family: 'Noto Sans SC', sans-serif;
                background-color: var(--color-bg);
                color: var(--color-text);
            }
            .font-display {
                font-family: 'Playfair Display', serif;
            }
        }
        @layer components {
            .glass-panel {
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(20px);
                border: 1px solid var(--color-border);
            }
            .time-slot {
                transition: all 0.2s ease;
            }
            .time-slot:hover {
                background-color: var(--color-surface-hover);
            }
            .time-slot.drag-over {
                background-color: var(--color-accent-light);
                border-color: var(--color-accent);
            }
            .task-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                cursor: grab;
            }
            .task-card:active {
                cursor: grabbing;
            }
            .task-card.dragging {
                opacity: 0.5;
                transform: rotate(3deg) scale(1.02);
            }
            .task-card.drag-preview {
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                opacity: 0.9;
                transform: rotate(3deg) scale(1.05);
                box-shadow: var(--shadow-hover);
            }
            .btn-primary {
                background: linear-gradient(135deg, var(--color-accent) 0%, #d4694f 100%);
                color: white;
                transition: all 0.3s ease;
            }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(224, 122, 95, 0.4);
            }
            .btn-secondary {
                background: var(--color-surface);
                border: 2px solid var(--color-border);
                color: var(--color-text);
                transition: all 0.3s ease;
            }
            .btn-secondary:hover {
                border-color: var(--color-accent);
                color: var(--color-accent);
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .quick-input {
                animation: slideIn 0.2s ease;
            }
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // 生成时间块
        const generateTimeSlots = (granularity) => {
            const slots = [];
            const totalMinutes = 24 * 60;
            const slotMinutes = granularity;
            
            for (let i = 0; i < totalMinutes; i += slotMinutes) {
                const hour = Math.floor(i / 60);
                const minute = i % 60;
                const timeStr = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
                slots.push({
                    id: `slot-${i}`,
                    time: timeStr,
                    hour,
                    minute,
                    index: i / slotMinutes
                });
            }
            return slots;
        };

        // 格式化时间显示
        const formatTimeRange = (slot, granularity) => {
            const startHour = slot.hour;
            const startMinute = slot.minute;
            const endTotalMinutes = startHour * 60 + startMinute + granularity;
            const endHour = Math.floor(endTotalMinutes / 60) % 24;
            const endMinute = endTotalMinutes % 60;
            
            const start = `${startHour.toString().padStart(2, '0')}:${startMinute.toString().padStart(2, '0')}`;
            const end = `${endHour.toString().padStart(2, '0')}:${endMinute.toString().padStart(2, '0')}`;
            return { start, end };
        };

        // 任务卡片组件
        const TaskCard = ({ task, draggable = false, onDragStart, onDragEnd, style = {}, className = '', onClick }) => {
            const cardRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);

            const priorityColors = {
                high: 'bg-red-50 border-red-200 text-red-800',
                medium: 'bg-amber-50 border-amber-200 text-amber-800',
                low: 'bg-emerald-50 border-emerald-200 text-emerald-800'
            };

            const handleMouseDown = (e) => {
                if (!draggable) return;
                if (onClick) return; // 如果有点击事件，不启用拖拽
                
                setIsDragging(true);
                
                // 创建拖拽预览元素
                const preview = cardRef.current.cloneNode(true);
                preview.classList.add('drag-preview');
                preview.style.width = `${cardRef.current.offsetWidth}px`;
                document.body.appendChild(preview);
                
                const rect = cardRef.current.getBoundingClientRect();
                const offsetX = e.clientX - rect.left;
                const offsetY = e.clientY - rect.top;
                
                preview.style.left = `${e.clientX - offsetX}px`;
                preview.style.top = `${e.clientY - offsetY}px`;
                
                onDragStart?.(task, { x: offsetX, y: offsetY });

                const handleMouseMove = (moveEvent) => {
                    preview.style.left = `${moveEvent.clientX - offsetX}px`;
                    preview.style.top = `${moveEvent.clientY - offsetY}px`;
                };

                const handleMouseUp = (upEvent) => {
                    setIsDragging(false);
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                    preview.remove();
                    onDragEnd?.(task, upEvent);
                };

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            };

            return (
                <div
                    ref={cardRef}
                    onMouseDown={handleMouseDown}
                    onClick={onClick}
                    style={style}
                    className={`
                        task-card
                        p-3 rounded-xl border-2 
                        ${priorityColors[task.priority] || priorityColors.medium}
                        ${draggable ? 'cursor-grab active:cursor-grabbing' : ''}
                        ${onClick ? 'cursor-pointer' : ''}
                        ${isDragging ? 'dragging' : ''}
                        ${className}
                        select-none
                    `}
                >
                    <div className="flex items-start gap-2">
                        <div className="w-1.5 h-1.5 rounded-full bg-current mt-2 flex-shrink-0 opacity-60"></div>
                        <div className="flex-1 min-w-0">
                            <p className="font-medium text-sm leading-relaxed truncate">{task.title}</p>
                            {task.description && (
                                <p className="text-xs opacity-70 mt-1 line-clamp-2">{task.description}</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 快速输入组件
        const QuickInput = ({ onSubmit, onCancel, placeholder = "输入任务..." }) => {
            const [value, setValue] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                inputRef.current?.focus();
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (value.trim()) {
                    onSubmit(value.trim());
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Escape') {
                    onCancel();
                }
            };

            return (
                <form onSubmit={handleSubmit} className="quick-input">
                    <input
                        ref={inputRef}
                        type="text"
                        value={value}
                        onChange={(e) => setValue(e.target.value)}
                        onKeyDown={handleKeyDown}
                        placeholder={placeholder}
                        className="w-full px-3 py-2 rounded-lg border-2 border-[var(--color-accent)]
                                 bg-white focus:outline-none text-sm"
                    />
                    <div className="flex gap-2 mt-2">
                        <button
                            type="submit"
                            className="flex-1 py-1.5 px-3 rounded-lg bg-[var(--color-accent)] text-white text-xs font-medium"
                        >
                            确认
                        </button>
                        <button
                            type="button"
                            onClick={onCancel}
                            className="flex-1 py-1.5 px-3 rounded-lg bg-gray-100 text-gray-600 text-xs font-medium"
                        >
                            取消
                        </button>
                    </div>
                </form>
            );
        };

        // 时间块组件
        const TimeSlot = ({ slot, granularity, assignedTask, onRemoveTask, isDragOver, onQuickAdd }) => {
            const { start, end } = formatTimeRange(slot, granularity);
            const isHourStart = slot.minute === 0;
            const [showQuickInput, setShowQuickInput] = useState(false);

            const handleClick = () => {
                if (!assignedTask && !showQuickInput) {
                    setShowQuickInput(true);
                }
            };

            const handleQuickSubmit = (title) => {
                onQuickAdd(slot.id, title);
                setShowQuickInput(false);
            };

            return (
                <div
                    data-slot-id={slot.id}
                    className={`
                        time-slot relative border-b border-[var(--color-border)]
                        ${isDragOver ? 'drag-over' : ''}
                        ${isHourStart ? 'bg-gradient-to-r from-white to-[var(--color-bg)]' : ''}
                    `}
                    style={{ minHeight: granularity <= 30 ? '60px' : '80px' }}
                >
                    <div className="flex">
                        {/* 时间标签 */}
                        <div className={`
                            w-20 flex-shrink-0 py-2 px-3 text-right
                            ${isHourStart ? 'font-semibold text-[var(--color-text)]' : 'text-[var(--color-text-muted)] text-sm'}
                        `}>
                            <span>{start}</span>
                        </div>
                        
                        {/* 任务放置区域 */}
                        <div 
                            className="flex-1 p-2 relative cursor-pointer"
                            onClick={handleClick}
                        >
                            {assignedTask ? (
                                <div className="relative group">
                                    <TaskCard task={assignedTask} />
                                    <button
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            onRemoveTask(slot.id);
                                        }}
                                        className="absolute -top-1 -right-1 w-5 h-5 bg-red-400 text-white rounded-full 
                                                   opacity-0 group-hover:opacity-100 transition-opacity
                                                   flex items-center justify-center text-xs shadow-sm"
                                    >
                                        ×
                                    </button>
                                </div>
                            ) : showQuickInput ? (
                                <QuickInput
                                    onSubmit={handleQuickSubmit}
                                    onCancel={() => setShowQuickInput(false)}
                                    placeholder={`${start} 添加临时任务...`}
                                />
                            ) : (
                                <div className="h-full min-h-[40px] rounded-lg border-2 border-dashed 
                                              border-[var(--color-border)] opacity-0 hover:opacity-100 
                                              transition-opacity flex items-center justify-center">
                                    <span className="text-xs text-[var(--color-text-muted)]">点击添加临时任务</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 添加常用任务表单
        const AddCommonTaskForm = ({ onAdd }) => {
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [priority, setPriority] = useState('medium');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title.trim()) return;
                
                onAdd({
                    id: `common-task-${Date.now()}`,
                    title: title.trim(),
                    description: description.trim(),
                    priority,
                    isCommon: true,
                    createdAt: Date.now()
                });
                
                setTitle('');
                setDescription('');
                setPriority('medium');
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-3">
                    <div>
                        <input
                            type="text"
                            value={title}
                            onChange={(e) => setTitle(e.target.value)}
                            placeholder="输入常用任务名称（如：健身、吃饭、学习）..."
                            className="w-full px-4 py-3 rounded-xl border-2 border-[var(--color-border)]
                                     bg-white focus:border-[var(--color-accent)] focus:outline-none
                                     transition-colors text-sm"
                        />
                    </div>
                    <div>
                        <textarea
                            value={description}
                            onChange={(e) => setDescription(e.target.value)}
                            placeholder="任务描述（可选）..."
                            rows="2"
                            className="w-full px-4 py-3 rounded-xl border-2 border-[var(--color-border)]
                                     bg-white focus:border-[var(--color-accent)] focus:outline-none
                                     transition-colors text-sm resize-none"
                        />
                    </div>
                    <div className="flex gap-2">
                        {['high', 'medium', 'low'].map((p) => (
                            <button
                                key={p}
                                type="button"
                                onClick={() => setPriority(p)}
                                className={`
                                    flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all
                                    ${priority === p 
                                        ? p === 'high' ? 'bg-red-100 text-red-700 border-2 border-red-300'
                                        : p === 'medium' ? 'bg-amber-100 text-amber-700 border-2 border-amber-300'
                                        : 'bg-emerald-100 text-emerald-700 border-2 border-emerald-300'
                                        : 'bg-gray-100 text-gray-600 border-2 border-transparent hover:bg-gray-200'
                                    }
                                `}
                            >
                                {p === 'high' ? '高优先级' : p === 'medium' ? '中优先级' : '低优先级'}
                            </button>
                        ))}
                    </div>
                    <button
                        type="submit"
                        className="btn-primary w-full py-3 rounded-xl font-medium text-sm"
                    >
                        添加到常用任务库
                    </button>
                </form>
            );
        };

        // 主应用组件
        const ScheduleApp = () => {
            const [granularity, setGranularity] = useState(60);
            // 常用任务库 - 长期保存的日常任务
            const [commonTasks, setCommonTasks] = useState([]);
            // 今日临时任务 - 仅当天的特殊任务
            const [tempTasks, setTempTasks] = useState([]);
            // 日程安排 - 记录每个时间块分配的任务ID
            const [schedule, setSchedule] = useState({});
            const [dragOverSlot, setDragOverSlot] = useState(null);
            const [draggedTask, setDraggedTask] = useState(null);
            const [activeTab, setActiveTab] = useState('common'); // 'common' | 'temp'
            const timeSlotsContainerRef = useRef(null);

            // 从本地存储加载数据
            useEffect(() => {
                const savedCommonTasks = localStorage.getItem('schedule_common_tasks');
                const savedTempTasks = localStorage.getItem('schedule_temp_tasks');
                const savedSchedule = localStorage.getItem('schedule_schedule');
                const savedGranularity = localStorage.getItem('schedule_granularity');
                
                if (savedCommonTasks) setCommonTasks(JSON.parse(savedCommonTasks));
                if (savedTempTasks) setTempTasks(JSON.parse(savedTempTasks));
                if (savedSchedule) setSchedule(JSON.parse(savedSchedule));
                if (savedGranularity) setGranularity(parseInt(savedGranularity));
            }, []);

            // 保存到本地存储
            useEffect(() => {
                localStorage.setItem('schedule_common_tasks', JSON.stringify(commonTasks));
                localStorage.setItem('schedule_temp_tasks', JSON.stringify(tempTasks));
                localStorage.setItem('schedule_schedule', JSON.stringify(schedule));
                localStorage.setItem('schedule_granularity', granularity.toString());
            }, [commonTasks, tempTasks, schedule, granularity]);

            const timeSlots = useMemo(() => generateTimeSlots(granularity), [granularity]);

            const handleDragStart = useCallback((task) => {
                setDraggedTask(task);
            }, []);

            const handleDragEnd = useCallback((task, event) => {
                setDraggedTask(null);
                setDragOverSlot(null);

                // 查找鼠标下方的元素
                const elementBelow = document.elementFromPoint(event.clientX, event.clientY);
                if (!elementBelow) return;

                // 查找最近的时间槽
                const slotElement = elementBelow.closest('[data-slot-id]');
                if (!slotElement) return;

                const slotId = slotElement.getAttribute('data-slot-id');
                if (!slotId) return;

                // 更新日程安排
                setSchedule(prev => {
                    const newSchedule = { ...prev };
                    // 移除该任务在其他时间块的安排
                    Object.keys(newSchedule).forEach(key => {
                        if (newSchedule[key] === task.id) {
                            delete newSchedule[key];
                        }
                    });
                    // 添加到新时间块
                    newSchedule[slotId] = task.id;
                    return newSchedule;
                });
            }, []);

            const handleMouseMove = useCallback((e) => {
                if (!draggedTask) {
                    setDragOverSlot(null);
                    return;
                }

                const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
                if (!elementBelow) {
                    setDragOverSlot(null);
                    return;
                }

                const slotElement = elementBelow.closest('[data-slot-id]');
                if (slotElement) {
                    setDragOverSlot(slotElement.getAttribute('data-slot-id'));
                } else {
                    setDragOverSlot(null);
                }
            }, [draggedTask]);

            useEffect(() => {
                if (draggedTask) {
                    document.addEventListener('mousemove', handleMouseMove);
                    return () => document.removeEventListener('mousemove', handleMouseMove);
                }
            }, [draggedTask, handleMouseMove]);

            // 添加常用任务
            const handleAddCommonTask = useCallback((task) => {
                setCommonTasks(prev => [...prev, task]);
            }, []);

            // 删除常用任务
            const handleDeleteCommonTask = useCallback((taskId) => {
                setCommonTasks(prev => prev.filter(t => t.id !== taskId));
                // 同时从日程中移除
                setSchedule(prev => {
                    const newSchedule = { ...prev };
                    Object.keys(newSchedule).forEach(key => {
                        if (newSchedule[key] === taskId) {
                            delete newSchedule[key];
                        }
                    });
                    return newSchedule;
                });
            }, []);

            // 快速添加临时任务
            const handleQuickAddTempTask = useCallback((slotId, title) => {
                const newTask = {
                    id: `temp-task-${Date.now()}`,
                    title,
                    description: '',
                    priority: 'medium',
                    isCommon: false,
                    createdAt: Date.now()
                };
                setTempTasks(prev => [...prev, newTask]);
                setSchedule(prev => ({
                    ...prev,
                    [slotId]: newTask.id
                }));
            }, []);

            // 从时间块移除任务
            const handleRemoveTaskFromSlot = useCallback((slotId) => {
                const taskId = schedule[slotId];
                setSchedule(prev => {
                    const newSchedule = { ...prev };
                    delete newSchedule[slotId];
                    return newSchedule;
                });
                // 如果是临时任务，同时删除该任务
                const task = getTaskById(taskId);
                if (task && !task.isCommon) {
                    setTempTasks(prev => prev.filter(t => t.id !== taskId));
                }
            }, [schedule]);

            // 获取所有任务
            const allTasks = useMemo(() => [...commonTasks, ...tempTasks], [commonTasks, tempTasks]);

            // 常用任务始终显示在任务库中（支持一天多次使用）
            const unscheduledCommonTasks = commonTasks;
            // 临时任务只在未安排时显示
            const unscheduledTempTasks = tempTasks.filter(task => 
                !Object.values(schedule).includes(task.id)
            );

            const getTaskById = (taskId) => allTasks.find(t => t.id === taskId);

            // 获取今日日期
            const today = new Date().toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });

            return (
                <div className="min-h-screen bg-[var(--color-bg)]">
                    {/* 顶部导航 */}
                    <header className="glass-panel sticky top-0 z-50 border-b">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <h1 className="font-display text-2xl font-bold text-[var(--color-text)]">
                                        日程管理
                                    </h1>
                                    <span className="text-[var(--color-text-muted)] text-sm">
                                        {today}
                                    </span>
                                </div>
                                
                                {/* 时间粒度选择器 */}
                                <div className="flex items-center gap-2 bg-white rounded-xl p-1.5 shadow-sm border border-[var(--color-border)]">
                                    <span className="text-xs text-[var(--color-text-muted)] px-2">时间粒度:</span>
                                    {[15, 30, 60].map((g) => (
                                        <button
                                            key={g}
                                            onClick={() => setGranularity(g)}
                                            className={`
                                                px-3 py-1.5 rounded-lg text-xs font-medium transition-all
                                                ${granularity === g 
                                                    ? 'bg-[var(--color-accent)] text-white shadow-sm' 
                                                    : 'text-[var(--color-text-muted)] hover:bg-[var(--color-surface-hover)]'
                                                }
                                            `}
                                        >
                                            {g}分钟
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* 主内容区 */}
                    <main className="max-w-7xl mx-auto px-6 py-6">
                        <div className="grid grid-cols-12 gap-6">
                            {/* 左侧：时间轴 */}
                            <div className="col-span-8">
                                <div className="glass-panel rounded-2xl shadow-[var(--shadow-soft)] overflow-hidden">
                                    <div className="px-6 py-4 border-b border-[var(--color-border)] bg-gradient-to-r from-white to-[var(--color-bg)]">
                                        <h2 className="font-display text-lg font-semibold text-[var(--color-text)]">
                                            今日时间轴
                                        </h2>
                                        <p className="text-xs text-[var(--color-text-muted)] mt-1">
                                            点击空白时间块添加临时任务，或从右侧拖拽常用任务
                                        </p>
                                    </div>
                                    <div 
                                        ref={timeSlotsContainerRef}
                                        className="max-h-[calc(100vh-240px)] overflow-y-auto scrollbar-hide"
                                    >
                                        {timeSlots.map((slot) => (
                                            <TimeSlot
                                                key={slot.id}
                                                slot={slot}
                                                granularity={granularity}
                                                assignedTask={schedule[slot.id] ? getTaskById(schedule[slot.id]) : null}
                                                onRemoveTask={handleRemoveTaskFromSlot}
                                                isDragOver={dragOverSlot === slot.id}
                                                onQuickAdd={handleQuickAddTempTask}
                                            />
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* 右侧：任务管理 */}
                            <div className="col-span-4 space-y-4">
                                {/* 添加常用任务 */}
                                <div className="glass-panel rounded-2xl shadow-[var(--shadow-soft)] p-5">
                                    <h3 className="font-display text-base font-semibold mb-4 text-[var(--color-text)]">
                                        添加常用任务
                                    </h3>
                                    <p className="text-xs text-[var(--color-text-muted)] mb-3">
                                        日常频发任务（如健身、吃饭、学习）会保存在任务库中，可反复使用
                                    </p>
                                    <AddCommonTaskForm onAdd={handleAddCommonTask} />
                                </div>

                                {/* 任务库标签切换 */}
                                <div className="glass-panel rounded-2xl shadow-[var(--shadow-soft)] overflow-hidden">
                                    <div className="flex border-b border-[var(--color-border)]">
                                        <button
                                            onClick={() => setActiveTab('common')}
                                            className={`
                                                flex-1 py-3 px-4 text-sm font-medium transition-all
                                                ${activeTab === 'common' 
                                                    ? 'text-[var(--color-accent)] border-b-2 border-[var(--color-accent)] bg-[var(--color-accent-light)]' 
                                                    : 'text-[var(--color-text-muted)] hover:bg-[var(--color-surface-hover)]'
                                                }
                                            `}
                                        >
                                            常用任务库
                                            <span className="ml-2 text-xs bg-white px-2 py-0.5 rounded-full">
                                                {unscheduledCommonTasks.length}
                                            </span>
                                        </button>
                                        <button
                                            onClick={() => setActiveTab('temp')}
                                            className={`
                                                flex-1 py-3 px-4 text-sm font-medium transition-all
                                                ${activeTab === 'temp' 
                                                    ? 'text-[var(--color-accent)] border-b-2 border-[var(--color-accent)] bg-[var(--color-accent-light)]' 
                                                    : 'text-[var(--color-text-muted)] hover:bg-[var(--color-surface-hover)]'
                                                }
                                            `}
                                        >
                                            今日临时任务
                                            <span className="ml-2 text-xs bg-white px-2 py-0.5 rounded-full">
                                                {unscheduledTempTasks.length}
                                            </span>
                                        </button>
                                    </div>
                                    
                                    <div className="p-5">
                                        {activeTab === 'common' ? (
                                            <div className="space-y-3 max-h-[300px] overflow-y-auto scrollbar-hide">
                                                {unscheduledCommonTasks.length === 0 ? (
                                                    <div className="text-center py-6 text-[var(--color-text-muted)]">
                                                        <p className="text-sm">暂无常用任务</p>
                                                        <p className="text-xs opacity-70 mt-1">添加日常频发任务到任务库</p>
                                                    </div>
                                                ) : (
                                                    unscheduledCommonTasks.map((task) => (
                                                        <div key={task.id} className="group relative">
                                                            <TaskCard 
                                                                task={task} 
                                                                draggable={true}
                                                                onDragStart={handleDragStart}
                                                                onDragEnd={handleDragEnd}
                                                            />
                                                            <button
                                                                onClick={() => handleDeleteCommonTask(task.id)}
                                                                className="absolute -top-1 -right-1 w-5 h-5 bg-gray-400 text-white 
                                                                           rounded-full opacity-0 group-hover:opacity-100 
                                                                           transition-opacity flex items-center justify-center 
                                                                           text-xs shadow-sm hover:bg-red-400"
                                                            >
                                                                ×
                                                            </button>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        ) : (
                                            <div className="space-y-3 max-h-[300px] overflow-y-auto scrollbar-hide">
                                                {unscheduledTempTasks.length === 0 ? (
                                                    <div className="text-center py-6 text-[var(--color-text-muted)]">
                                                        <p className="text-sm">暂无临时任务</p>
                                                        <p className="text-xs opacity-70 mt-1">点击时间轴空白处添加临时任务</p>
                                                    </div>
                                                ) : (
                                                    unscheduledTempTasks.map((task) => (
                                                        <div key={task.id}>
                                                            <TaskCard 
                                                                task={task} 
                                                                draggable={true}
                                                                onDragStart={handleDragStart}
                                                                onDragEnd={handleDragEnd}
                                                            />
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* 统计信息 */}
                                <div className="glass-panel rounded-2xl shadow-[var(--shadow-soft)] p-5">
                                    <h3 className="font-display text-base font-semibold mb-4 text-[var(--color-text)]">
                                        今日概览
                                    </h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="text-center p-3 rounded-xl bg-[var(--color-bg)]">
                                            <div className="text-2xl font-bold text-[var(--color-accent)]">
                                                {Object.keys(schedule).length}
                                            </div>
                                            <div className="text-xs text-[var(--color-text-muted)] mt-1">已安排时间段</div>
                                        </div>
                                        <div className="text-center p-3 rounded-xl bg-[var(--color-bg)]">
                                            <div className="text-2xl font-bold text-[var(--color-success)]">
                                                {commonTasks.length}
                                            </div>
                                            <div className="text-xs text-[var(--color-text-muted)] mt-1">常用任务数</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ScheduleApp />);
    </script>
</body>
</html>
